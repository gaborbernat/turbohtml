name: 👷 benchmark
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags-ignore: ["**"]
  pull_request:
concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  codspeed:
    name: 🚀 CodSpeed
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # OIDC lets the CodSpeed GitHub App authenticate this public repo without a token secret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # meson project() derives the version from git history
          submodules: true # the benchmarks read the vendored html5lib-python and War-and-Peace corpora
          persist-credentials: false
      - name: 🔄 Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      # build the optimized extension and install the benchmark deps outside the runner, so only the pytest process
      # below is measured under instrumentation, never the uv/meson build. --notest creates the environment and installs
      # the benchmark deps but skips tox's commands; pgo_build then does the two-phase profile-guided build (instrument,
      # train on the real corpora, rebuild against the profile) into that environment, so the gate measures the same
      # optimization the release wheels ship rather than a plain -O3 build.
      - name: 🏗️ Build the extension profile-guided and install benchmark deps
        run: |
          uvx --with tox-uv tox run -e codspeed --notest
          .tox/codspeed/bin/python tools/pgo_build.py --python .tox/codspeed/bin/python --build-dir .tox/codspeed/cbuild
        env:
          UV_PYTHON_PREFERENCE: only-managed
      - name: 🚀 Run benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        env:
          # GitHub hands each run a different physical CPU (Intel Xeon with AVX-512, or AMD EPYC without), and glibc
          # dispatches a different SIMD memcpy/memmove per CPU, so Callgrind counts different instructions for the same
          # code and untouched benchmarks drift a few percent run to run. Force one baseline path on every CPU.
          GLIBC_TUNABLES: "glibc.cpu.hwcaps=-AVX512F,-AVX512VL,-AVX512BW,-AVX512DQ,-AVX512CD,-AVX2,-AVX,-ERMS,-FSRM"
        with:
          mode: simulation
          run: .tox/codspeed/bin/python -m pytest tests/benchmarks --codspeed
