name: 👷 benchmark
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags-ignore: ["**"]
  pull_request:
concurrency:
  # Key push runs by commit, pull-request runs by ref. Every main commit is a base measurement some
  # open PR compares against, so it must run to completion; keying pushes by ref meant the next main
  # commit canceled the previous one's benchmark mid-run, leaving CodSpeed to diff against a partial
  # or stale base and report drift on untouched benchmarks. Pull-request runs still supersede their
  # own older commits.
  group: codspeed-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions:
  contents: read
jobs:
  codspeed:
    name: 🚀 CodSpeed
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # OIDC lets the CodSpeed GitHub App authenticate this public repo without a token secret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # meson project() derives the version from git history
          submodules: true # the benchmarks read the vendored html5lib-python and War-and-Peace corpora
          persist-credentials: false
      - name: 🔄 Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
      # build the extension and install the benchmark deps outside the runner, so only the pytest process below is
      # measured under instrumentation, never the uv/meson build. --notest creates the environment and installs the
      # benchmark deps but skips tox's commands; the uv install then builds a deterministic LTO-only editable extension
      # into that environment. The gate measures LTO, not PGO, on purpose: PGO regenerates a fresh profile every build,
      # which is not byte-reproducible, so a re-profiled binary flips marginal ops a few percent across CodSpeed's
      # heterogeneous CPU runners and reports false regressions that mask real ones (spike #478). LTO is deterministic.
      # The shipped wheels keep PGO+LTO for max perf (see tools/pgo_build.py and pyproject's cibuildwheel config).
      - name: 🏗️ Build the deterministic LTO extension and install benchmark deps
        run: |
          uvx --with tox-uv tox run -e codspeed --notest
          uv pip install --python .tox/codspeed/bin/python --reinstall --no-deps --no-build-isolation --editable . \
            --config-settings=build-dir=.tox/codspeed/cbuild \
            --config-settings=setup-args=-Dbuildtype=release \
            --config-settings=setup-args=-Db_lto=true
        env:
          UV_PYTHON_PREFERENCE: only-managed
      - name: 🚀 Run benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        env:
          # GitHub hands each run a different physical CPU (Intel Xeon with AVX-512, or AMD EPYC without), and glibc
          # dispatches a different SIMD memcpy/memmove per CPU, so Callgrind counts different instructions for the same
          # code and untouched benchmarks drift a few percent run to run. Force one baseline path on every CPU.
          # arena_max pins the other half of that dispatch: glibc sizes the malloc arena count from the core count
          # (8 * ncores), so a runner with a different core count takes different paths through malloc and Callgrind
          # counts those too. Every op here allocates -- the tokenizer and DOM grow their buffers as they parse -- so
          # the arena count reaches the measurement. One arena is the same arena on every runner.
          GLIBC_TUNABLES: "glibc.cpu.hwcaps=-AVX512F,-AVX512VL,-AVX512BW,-AVX512DQ,-AVX512CD,-AVX2,-AVX,-ERMS,-FSRM:glibc.malloc.arena_max=1"
        with:
          mode: simulation
          run: .tox/codspeed/bin/python -m pytest tests/benchmarks --codspeed
