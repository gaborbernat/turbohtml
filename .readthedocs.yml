version: 2
# the docs build needs no submodules; excluding them keeps Read the Docs from fetching the large
# conformance/bench corpora (e.g. the qt3tests XPath suite) on every build
submodules:
  exclude: all
build:
  os: ubuntu-lts-latest
  tools:
    python: "3"
  commands:
    - pip install uv
    - uv venv
    - uv pip install tox-uv
    - .venv/bin/tox run -e docs --
