ci:
  skip: ["clang-tidy"] # needs a local Meson build of the C extension, unavailable on pre-commit.ci
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0" # v6.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^(tests/url/data/IdnaTestV2\.txt|tools/fuzz/corpus/.*)$ # vendored verbatim / byte-exact crash inputs
      - id: trailing-whitespace
        exclude: ^(tests/url/data/IdnaTestV2\.txt|tools/fuzz/corpus/.*)$ # vendored verbatim / byte-exact crash inputs
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.37.3" # 0.37.2
    hooks:
      - id: check-github-workflows
        args: ["--verbose"]
  - repo: https://github.com/codespell-project/codespell
    rev: "v2.4.2" # v2.4.2
    hooks:
      - id: codespell
        additional_dependencies: ["tomli>=2.4.1"]
  - repo: https://github.com/tox-dev/tox-toml-fmt
    rev: "v1.9.3" # v1.9.3
    hooks:
      - id: tox-toml-fmt
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.25.1" # v2.23.0
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: "v22.1.5" # v22.1.5
    hooks:
      - id: clang-format
        files: ^src/turbohtml/.*\.(c|h)$
        exclude: ^src/turbohtml/_c/(data/(html_entities|entity_names|tld_table|psl_table|idna_table)|encoding/detect_data)\.h$ # generated tables
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.20" # v0.15.16
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: ["--fix", "--unsafe-fixes", "--exit-non-zero-on-fix"]
  - repo: https://github.com/pre-commit/sync-pre-commit-deps
    rev: "v0.0.4" # v0.0.4
    hooks:
      - id: sync-pre-commit-deps
  - repo: https://github.com/google/yamlfmt
    rev: "v0.21.0" # v0.21.0
    hooks:
      - id: yamlfmt
  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy
        entry: python tools/run_clang_tidy.py
        language: python
        files: ^src/turbohtml/.*\.c$
        require_serial: true
        additional_dependencies:
          - clang-tidy==22.1.7
          - meson>=1.11.1
          - ninja>=1.13
      - id: mdformat
        name: mdformat
        entry: mdformat --wrap 120
        language: python
        types: [markdown]
        additional_dependencies:
          - mdformat-gfm>=1
          - mdformat-ruff>=0.1.3
          - mdformat-frontmatter>=2.1.2 # keep the YAML front matter in issue templates intact
      - id: ruff-docs
        name: ruff (doc snippets)
        entry: python tools/ruff_docs.py
        language: python
        files: ^docs/.*\.rst$
        additional_dependencies:
          - ruff==0.15.18 # kept on the ruff-pre-commit rev by sync-pre-commit-deps
      - id: changelogs-rst
        name: changelog filenames
        language: fail
        entry: "changelog files must be named ####.(breaking|feature|bugfix|doc|packaging|misc).rst"
        exclude: ^docs/changelog/(\d+\.(breaking|feature|bugfix|doc|packaging|misc)\.rst|template\.jinja2)$
        files: ^docs/changelog/
  - repo: https://github.com/LilSpazJoekp/docstrfmt
    rev: "v2.2.0" # v2.1.0
    hooks:
      - id: docstrfmt
        args: ["--line-length=120", "--no-format-python-code-blocks"] # ruff-docs owns the Python snippets
        types_or: [rst]
        files: ^docs/.*\.rst$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: "v1.26.1" # v1.25.2
    hooks:
      - id: zizmor
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
