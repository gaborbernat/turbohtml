ci:
  skip: ["clang-tidy"] # needs a local Meson build of the C extension, unavailable on pre-commit.ci
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "3e8a8703264a2f4a69428a0aa4dcb512790b2c8c" # v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "f805888065fdb6162e1f800e50bb9460cbd223d6" # 0.37.2
    hooks:
      - id: check-github-workflows
        args: ["--verbose"]
  - repo: https://github.com/codespell-project/codespell
    rev: "2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a" # v2.4.2
    hooks:
      - id: codespell
        additional_dependencies: ["tomli>=2.4.1"]
  - repo: https://github.com/tox-dev/tox-toml-fmt
    rev: "142187f8c21fa06a57faa7b9d862fe940f208f12" # v1.9.3
    hooks:
      - id: tox-toml-fmt
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "3a8ef795727fa946dfcb21c5d07b1442c2362c09" # v2.23.0
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: "dd18dad857d6133e90bbe478f4f2f22ec0030269" # v22.1.5
    hooks:
      - id: clang-format
        files: ^src/turbohtml/.*\.(c|h)$
        exclude: ^src/turbohtml/(html_entities|entity_names)\.h$ # generated tables
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "22f0422809455ec89ffdcf5a00170ba816e42ddb" # v0.15.16
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: ["--fix", "--unsafe-fixes", "--exit-non-zero-on-fix"]
  - repo: https://github.com/google/yamlfmt
    rev: "21ca5323a9c87ee37a434e0ca908efc0a89daa07" # v0.21.0
    hooks:
      - id: yamlfmt
  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy
        entry: python tools/run_clang_tidy.py
        language: python
        files: ^src/turbohtml/.*\.c$
        require_serial: true
        additional_dependencies:
          - clang-tidy==22.1.0.1
          - meson>=1.11.1
          - ninja>=1.11.1
      - id: mdformat
        name: mdformat
        entry: mdformat --wrap 120
        language: python
        types: [markdown]
        additional_dependencies:
          - mdformat-gfm>=1
          - mdformat-ruff>=0.1.3
          - mdformat-frontmatter>=2.1.2 # keep the YAML front matter in issue templates intact
      - id: changelogs-rst
        name: changelog filenames
        language: fail
        entry: "changelog files must be named ####.(breaking|feature|bugfix|doc|packaging|misc).rst"
        exclude: ^docs/changelog/(\d+\.(breaking|feature|bugfix|doc|packaging|misc)\.rst|template\.jinja2)$
        files: ^docs/changelog/
  - repo: https://github.com/LilSpazJoekp/docstrfmt
    rev: "06455715c8a81e176748e036c1c945f3e80d5b8d" # v2.1.0
    hooks:
      - id: docstrfmt
        args: ["--line-length=120"]
        types_or: [rst]
        files: ^docs/.*\.rst$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: "9257c6050c0261b8c57e712f632dc4a8010109a9" # v1.25.2
    hooks:
      - id: zizmor
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
